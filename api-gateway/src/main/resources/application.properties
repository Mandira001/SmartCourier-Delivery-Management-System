spring.application.name=api-gateway
server.port=8080

# Eureka connection
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Static test route
#spring.cloud.gateway.routes[0].id=test-route
#spring.cloud.gateway.routes[0].uri=http://httpbin.org
#spring.cloud.gateway.routes[0].predicates[0]=Path=/test/**
#spring.cloud.gateway.routes[0].filters[0]=RewritePath=/test/(?<segment>.*), /${segment}

# Route to Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2


# Route to Delivery Service
spring.cloud.gateway.routes[1].id=delivery-service
spring.cloud.gateway.routes[1].uri=lb://DELIVERY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/gateway/deliveries/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

# Route to Tracking Service
spring.cloud.gateway.routes[2].id=tracking-service
spring.cloud.gateway.routes[2].uri=lb://TRACKING-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/gateway/tracking/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2

# Route to Admin Service
spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/gateway/admin/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2

# Swagger
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/gateway/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=delivery-service
springdoc.swagger-ui.urls[1].url=/gateway/deliveries/v3/api-docs

springdoc.swagger-ui.urls[2].name=tracking-service
springdoc.swagger-ui.urls[2].url=/gateway/tracking/v3/api-docs

springdoc.swagger-ui.urls[3].name=admin-service
springdoc.swagger-ui.urls[3].url=/gateway/admin/v3/api-docs