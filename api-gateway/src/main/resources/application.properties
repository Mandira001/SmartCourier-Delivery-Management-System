spring.application.name=api-gateway
server.port=8080

# CONFIG SERVER
spring.config.import=optional:configserver:http://config-server:8888
spring.cloud.config.fail-fast=true
#
#spring.cloud.config.retry.max-attempts=10
#spring.cloud.config.retry.initial-interval=2000

# REQUIRED
spring.main.web-application-type=reactive

# SWAGGER UI
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/gateway/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=delivery-service
springdoc.swagger-ui.urls[1].url=/gateway/deliveries/v3/api-docs

springdoc.swagger-ui.urls[2].name=tracking-service
springdoc.swagger-ui.urls[2].url=/gateway/tracking/v3/api-docs

springdoc.swagger-ui.urls[3].name=admin-service
springdoc.swagger-ui.urls[3].url=/gateway/admin/v3/api-docs

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

spring.sleuth.enabled=true
management.tracing.propagation.type=w3c,b3

# Circuit Breaker Default Filter
spring.cloud.gateway.default-filters[0].name=CircuitBreaker
spring.cloud.gateway.default-filters[0].args.name=gatewayCircuitBreaker
spring.cloud.gateway.default-filters[0].args.fallbackUri=forward:/fallback

# Resilience4j Global Settings
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.timelimiter.configs.default.timeout-duration=5s
