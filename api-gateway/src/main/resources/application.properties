spring.application.name=api-gateway
server.port=8080

# CONFIG SERVER
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=true

# REQUIRED
spring.main.web-application-type=reactive

# SWAGGER UI
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/gateway/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=delivery-service
springdoc.swagger-ui.urls[1].url=/gateway/deliveries/v3/api-docs

springdoc.swagger-ui.urls[2].name=tracking-service
springdoc.swagger-ui.urls[2].url=/gateway/tracking/v3/api-docs

springdoc.swagger-ui.urls[3].name=admin-service
springdoc.swagger-ui.urls[3].url=/gateway/admin/v3/api-docs

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

spring.sleuth.enabled=true
management.tracing.propagation.type=w3c,b3

