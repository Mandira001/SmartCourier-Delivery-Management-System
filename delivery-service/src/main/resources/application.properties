spring.application.name=delivery-service
server.port=8082

spring.config.import=optional:configserver:http://config-server:8888
spring.cloud.config.fail-fast=true
#spring.cloud.config.retry.max-attempts=10
#spring.cloud.config.retry.initial-interval=2000

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Auto-create / update DB columns when entity changes
spring.jpa.hibernate.ddl-auto=update

# Serialize LocalDateTime as ISO string (not array) for inter-service compatibility
spring.jackson.serialization.write-dates-as-timestamps=false